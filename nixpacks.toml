# Railway/Nixpacks configuration
# IMPORTANT: --include=dev forces Vite + build tools to install even when
# Railway sets NODE_ENV=production (otherwise devDependencies get skipped).
[phases.setup]
nixPkgs = ["nodejs_20", "npm-9_x"]

[phases.install]
cmds = [
  "npm ci --include=dev || npm install --include=dev",
  "npm install --include=dev --prefix server",
  "npm install --include=dev --prefix client"
]

[phases.build]
cmds = ["npm run build --prefix client"]

[start]
cmd = "npm start --prefix server"
